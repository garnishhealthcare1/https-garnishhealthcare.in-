<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garnish Dental Clinic</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <img src="images/logo.png" class="logo">
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#services">Services</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO SLIDER -->
<section id="home" class="slider">
  <div class="slide active">Best Dental Care</div>
  <div class="slide">Smile Makeover Experts</div>
  <div class="slide">Book Your Appointment</div>
</section>

<!-- ABOUT -->
<section id="about">
  <h2>Doctor</h2>
  <img src="images/doctor.jpg" class="doctor">
  <p>Dr. Kalpana Tomar - Dental Surgeon</p>
</section>

<!-- SERVICES -->
<section id="services">
  <h2>Our Services</h2>
  <div class="cards">
    <div class="card">Dental Implant</div>
    <div class="card">Root Canal</div>
    <div class="card">Teeth Whitening</div>
  </div>
</section>

<!-- GALLERY -->
<section id="gallery">
  <h2>Before / After</h2>
  <img src="images/before1.jpg">
  <img src="images/after1.jpg">
</section>
  <!-- GALLERY -->
<section id="gallery">
  <h2>Before / After</h2>
  <img src="images/before2.jpg">
  <img src="images/after2.jpg">
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Book Appointment</h2>
  <form onsubmit="sendWhatsApp(); return false;">
    <input type="text" id="name" placeholder="Name" required>
    <input type="text" id="phone" placeholder="Phone" required>
    <button type="submit">Book Now</button>
  </form>
</section>
